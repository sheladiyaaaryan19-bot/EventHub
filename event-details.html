<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Details</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
}

.details-container{

    max-width:1100px;
    margin:50px auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);

}

.details-container img{

    width:100%;
    border-radius:12px;

}

.details-content h1{

    margin-bottom:20px;

}

.details-content p{

    font-size:18px;
    margin:12px 0;
    color:#555;

}

.book-btn{

    margin-top:25px;
    padding:15px 35px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}

.book-btn:hover{

    background:#1747b8;

}

</style>

</head>

<body>

<div class="details-container">

<img src="images/music.jpg" alt="Music Festival">

<div class="details-content">

<h1>🎵 Music Festival</h1>

<p><strong>📍 Location:</strong> Ahmedabad</p>

<p><strong>📅 Date:</strong> 20 August 2026</p>

<p><strong>🕒 Time:</strong> 7:00 PM</p>

<p><strong>💰 Ticket Price:</strong> ₹499</p>

<p><strong>👥 Organizer:</strong> EventHub Team</p>

<p>
Enjoy an unforgettable evening filled with live music,
famous singers, delicious food stalls, exciting games,
and entertainment for the whole family.
</p>

<button class="book-btn"
onclick="window.location.href='booking.html'">

Book Now

</button>

</div>

</div>

</body>

</html>
