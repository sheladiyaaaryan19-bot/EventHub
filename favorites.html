<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EventHub | Favorites</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f5f7fb;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:90%;
    max-width:1200px;
    margin:120px auto 50px;
}

h1{
    text-align:center;
    margin-bottom:40px;
    color:#222;
}

#favoriteContainer{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{

    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
    padding:25px;
    transition:.3s;

}

.card:hover{

    transform:translateY(-8px);

}

.card h2{

    margin-bottom:15px;

}

.card p{

    margin:10px 0;
    color:#666;

}

.remove{

    width:100%;
    padding:12px;
    margin-top:20px;
    background:#e53935;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;

}

.remove:hover{

    background:#c62828;

}

.back{

display:inline-block;
margin-bottom:30px;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;

}

.empty{

text-align:center;
font-size:20px;
color:#666;

}

</style>

</head>

<body>

<div class="container">

<a href="events.html" class="back">

⬅ Back to Events

</a>

<h1>

❤️ My Favorite Events

</h1>

<div id="favoriteContainer">

</div>

</div>

<script src="js/favorites.js"></script>

</body>

</html>
