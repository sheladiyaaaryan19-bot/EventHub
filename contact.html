<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EventHub | Contact</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f7fb;
}

.contact{

max-width:1100px;
margin:80px auto;
padding:40px;
background:#fff;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);

}

.contact h1{

text-align:center;
font-size:42px;
color:#2563eb;
margin-bottom:15px;

}

.contact p{

text-align:center;
color:#666;
margin-bottom:40px;

}

.wrapper{

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;

}

.info{

padding:20px;

}

.info h2{

margin-bottom:20px;
color:#222;

}

.info p{

text-align:left;
margin:15px 0;
font-size:17px;

}

.form{

padding:20px;

}

.form input,
.form textarea{

width:100%;
padding:14px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:16px;

}

.form textarea{

height:150px;
resize:none;

}

.form button{

width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

.form button:hover{

background:#1d4ed8;

}

.home{

display:inline-block;
margin-top:30px;
padding:12px 25px;
background:#2563eb;
color:#fff;
text-decoration:none;
border-radius:8px;

}

@media(max-width:768px){

.wrapper{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<section class="contact">

<h1>Contact Us</h1>

<p>

Have any questions? We'd love to hear from you.

</p>

<div class="wrapper">

<div class="info">

<h2>Contact Information</h2>

<p>📍 Ahmedabad, Gujarat, India</p>

<p>📞 +91 9876543210</p>

<p>📧 eventhub@gmail.com</p>

<p>🌐 www.eventhub.com</p>

<p>

We are available Monday to Saturday from 9:00 AM to 6:00 PM.

</p>

</div>

<div class="form">

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Your Name"
required>

<input
type="email"
id="email"
placeholder="Your Email"
required>

<input
type="text"
id="subject"
placeholder="Subject"
required>

<textarea
id="message"
placeholder="Your Message"
required></textarea>

<button type="submit">

Send Message

</button>

</form>

</div>

</div>

<a href="index.html" class="home">

🏠 Back to Home

</a>

</section>

<script>

document.getElementById("contactForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Thank you! Your message has been sent successfully.");

this.reset();

});

</script>

</body>

</html>
