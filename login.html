<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub | Login</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .login-page{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        .login-box h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .login-box input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
            outline:none;
        }

        .login-box input:focus{
            border-color:#2563eb;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            background:#1d4ed8;
        }

        .signup-link{
            text-align:center;
            margin-top:20px;
        }

        .signup-link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

        .back-home{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#555;
            text-decoration:none;
        }
    </style>

</head>
<body>

<section class="login-page">

<div class="login-box">

<h1>Login</h1>

<form id="loginForm">

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
maxlength="10"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button
class="login-btn"
type="submit">
Login
</button>

</form>

<div class="signup-link">

Don't have an account?

<a href="signup.html">
Create Account
</a>

</div>

<a
class="back-home"
href="index.html">

⬅ Back to Home

</a>

</div>

</section>

<script src="js/login.js"></script>

</body>
</html>
